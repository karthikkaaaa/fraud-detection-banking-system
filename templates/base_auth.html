<!DOCTYPE html>
<html>
<head>
    <title>TrustShield Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;   /* Full white screen */
        }

       .card {
    width: 60%;          /* Take most of screen */
    max-width: 500px;    /* Limit on desktop */
    margin: 60px auto;   /* Center */
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    background-color: white;
    text-align: center;
}

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #34495e;
        }

        .btn-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 15px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn-link:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

{% block content %}
{% endblock %}

</body>
</html>
