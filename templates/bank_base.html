<!DOCTYPE html>
<html>
<head>
    <title>TrustShield Bank Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background: #f4f6f9;
        }
.form-container {
    max-width: 400px;
    margin: 50px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
.form-container input {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    font-size: 14px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}


.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
}


button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background-color: #2c3e50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: #34495e;
}


.back-link {
    text-decoration: none;
    font-weight: bold;
    color: #2c3e50;
}


.error-msg {
    color: red;
    font-weight: bold;
}




@media (max-width: 768px) {
    .form-container {
        max-width: 360px;
        padding: 18px;
        margin: 25px auto;
    }
    .form-container input {
        padding: 8px;
        font-size: 13px;
    }
}




        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        
        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }



        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
            }
        }





.table-wrapper {
    width: 100%;
    overflow-x: auto;
}

table {
     width: 100%;
    min-width: 650px;
    border-collapse: collapse;
}
@media (max-width: 768px) {

    table th,
    table td {
        font-size: 12px;
        padding: 6px;
    }

    h2 {
        font-size: 18px;
        text-align: center;
    }

}


@media (max-width: 768px) {

    table th,
    table td {
        font-size: 12px;
        padding: 6px;
    }

    h2 {
        font-size: 18px;
        text-align: center;
    }

}



.table-wrapper {
    width: 100%;
    overflow-x: auto;
}

table {
    min-width: 700px;
}



@media (max-width: 768px) {

    .container {
        width: 100%;
        max-width: 100%;
        padding: 15px;
        margin: 10px auto;
    }

    table th, table td {
        font-size: 12px;
        padding: 6px;
    }

    h2 {
        font-size: 18px;
        text-align: center;
    }
}

.container {
    width: 95%;
    max-width: 1000px;
    margin: 40px auto;
    padding: 25px;
    box-sizing: border-box;
}

body {
    margin: 0;
    display: flex;
}


.sidebar {
    width: 220px;
    background: #2c3e50;
    min-height: 100vh;
}


.main {
    flex: 1;
    padding: 20px;
}

@media (max-width: 768px) {

    body {
        flex-direction: column;   
    }

    .sidebar {
        width: 100%;
        min-height: auto;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
    }

    .main {
        width: 100%;
        padding: 10px;
    }

    .container {
        width: 100%;
        max-width: 100%;
        padding: 10px;
    }

}


    </style>
</head>
<body>

<div class="sidebar">
    <h2>Bank Admin</h2>
    <a href="{% url 'bank_dashboard' %}">Dashboard</a>
    <a href="{% url 'staff_list' %}">Staff List</a>
    <a href="{% url 'add_staff' %}">Add Staff</a>
    <a href="{% url 'customer_dashboard' %}">Customers</a>
    <a href="{% url 'bank_history' %}">Transaction History</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
