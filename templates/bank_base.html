<!DOCTYPE html>
<html>
<head>
    <title>TrustShield Bank Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Bank Admin</h2>
    <a href="{% url 'bank_dashboard' %}">Dashboard</a>
    <a href="{% url 'staff_list' %}">Staff List</a>
    <a href="{% url 'add_staff' %}">Add Staff</a>
    <a href="{% url 'customer_dashboard' %}">Customers</a>
    <a href="{% url 'bank_history' %}">Transaction History</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
