<!DOCTYPE html>
<html>
<head>
    <title>TrustShield Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;  /* Full white */
        }
        textarea.textarea-box {
    width: 100%;
    min-height: 130px;
    padding: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
    resize: vertical;
    box-sizing: border-box;
}

.form-group {
    margin-bottom: 18px;
}
.card {
    background: #f8f9fa;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card a {
    text-decoration: none;
    font-weight: bold;
    color: #2c3e50;
}
       .container {
    width: 95%;
    max-width: 1100px;   /* Much bigger */
    margin: 50px auto;
    padding: 40px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

        h2 {
            margin-bottom: 28px;
        }

       input {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

       button {
    width: 100%;
    padding: 14px;
    font-size: 17px;
    background-color: #2c3e50;
    color: white;
    border: none;
    border-radius: 6px;
}

        button:hover {
            background-color: #34495e;
        }
{% comment %} 
        .btn-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 15px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        } {% endcomment %}

        {% comment %} .btn-link:hover {
            background-color: #34495e;
        } {% endcomment %}
         input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
      @media (max-width: 768px) {
    .container {
        width: 98%;
        padding: 20px;
    }
}
    </style>
</head>
<body>

{% block content %}
{% endblock %}

</body>
</html>
