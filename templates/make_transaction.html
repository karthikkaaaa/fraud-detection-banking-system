 {% extends "base_main.html" %}

{% block content %}
<div class="container">
    <h2>Make Payment</h2>
    <p>Welcome {{ request.user.username }}</p>
    <hr>

    <h3>📱 Paying To: {{ phone }}</h3>

    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}

    <form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <input type="number" name="amount" placeholder="Enter Amount" required>
    </div>

    <div class="form-group">
        <select name="location" required>
            <option value="">Select Location (State)</option>
            <option value="Kerala">Kerala</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Delhi">Delhi</option>
            <option value="Goa">Goa</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Telangana">Telangana</option>
            <option value="West Bengal">West Bengal</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
        </select>
    </div><br>

    <div class="form-group">
        <input type="password" name="confirm_password" placeholder="Enter Password to Confirm" required>
    </div>

    <button type="submit">Pay Now</button>
</form>
 <br>
    {% comment %} <a href="/logout/">Logout</a> {% endcomment %}
    <a href="{% url 'user_dashboard' %}">⬅ Back to Dashboard</a>
</div>
{% endblock %}
