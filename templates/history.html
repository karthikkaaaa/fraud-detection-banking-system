{% extends "base_main.html" %}

{% block content %}
<div class="container">
    <h2>Your Transactions</h2>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>Amount</th>
                <th>Location</th>
                <th>Status</th>
            </tr>

            {% for t in transactions %}
            <tr>
                <td>₹{{ t.amount }}</td>
                <td>{{ t.location }}</td>
                <td>{{ t.status }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No transactions yet.</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <br>
    {% comment %} <a href="{% url 'dashboard' %}">⬅ Back</a> {% endcomment %}
    <a href="/user-dashboard/">⬅ Back</a>
</div>
{% endblock %}
